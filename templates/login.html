{% extends 'base.html' %}
{% block title %}Admin Login — DealZone{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="container">
    <div class="auth-card mx-auto">
      <div class="auth-header">
        <div class="auth-icon"><i class="bi bi-shield-lock-fill"></i></div>
        <h2 class="auth-title">Admin Access</h2>
        <p class="auth-sub">Sign in to manage your DealZone products</p>
      </div>

      <form method="POST" action="{{ url_for('login') }}" novalidate>
        <div class="mb-4">
          <label for="username" class="form-label">Username</label>
          <div class="input-group amz-input-group">
            <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
            <input type="text" id="username" name="username" class="form-control amz-input"
                   placeholder="Enter username" autocomplete="username" required />
          </div>
        </div>
        <div class="mb-4">
          <label for="password" class="form-label">Password</label>
          <div class="input-group amz-input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" id="password" name="password" class="form-control amz-input"
                   placeholder="Enter password" autocomplete="current-password" required />
            <button class="input-group-text toggle-pw" type="button">
              <i class="bi bi-eye-fill"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn amz-btn-primary w-100 btn-lg mt-1">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
      </form>
    </div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
document.querySelector('.toggle-pw').addEventListener('click', function () {
  const pw = document.getElementById('password');
  const icon = this.querySelector('i');
  pw.type = pw.type === 'password' ? 'text' : 'password';
  icon.className = pw.type === 'password' ? 'bi bi-eye-fill' : 'bi bi-eye-slash-fill';
});
</script>
{% endblock %}
